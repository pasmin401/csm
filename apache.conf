<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Serve static assets directly
    Alias /assets /var/www/html/public/assets

    <Directory /var/www/html/public/assets>
        Require all granted
    </Directory>

    # URL rewriting rules (mirrors vercel.json routes)
    RewriteEngine On

    # Skip rewrite for actual files/directories
    RewriteCond %{REQUEST_FILENAME} -f [OR]
    RewriteCond %{REQUEST_FILENAME} -d
    RewriteRule ^ - [L]

    # Assets
    RewriteRule ^assets/(.*)$ /public/assets/$1 [L]

    # Uploads
    RewriteRule ^uploads/(.*)$ /tmp/uploads/$1 [L]

    # Admin routes
    RewriteRule ^admin/users(/.*)?$ /api/admin/users.php [L]
    RewriteRule ^admin/reports(/.*)?$ /api/admin/reports.php [L]
    RewriteRule ^admin/index(/.*)?$ /api/admin/index.php [L]
    RewriteRule ^admin(/.*)?$ /api/admin/index.php [L]

    # API attendance action
    RewriteRule ^api/attendance-action(/.*)?$ /api/attendance-action.php [L]

    # App routes
    RewriteRule ^dashboard(/.*)?$ /api/dashboard.php [L]
    RewriteRule ^register(/.*)?$ /api/register.php [L]
    RewriteRule ^logout(/.*)?$ /api/logout.php [L]
    RewriteRule ^profile(/.*)?$ /api/profile.php [L]
    RewriteRule ^forgot-password(/.*)?$ /api/forgot-password.php [L]
    RewriteRule ^test(/.*)?$ /api/test.php [L]
    RewriteRule ^debug(/.*)?$ /api/debug.php [L]
    RewriteRule ^install(/.*)?$ /api/install.php [L]

    # Default: login page
    RewriteRule ^(.*)$ /api/index.php [L]

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
